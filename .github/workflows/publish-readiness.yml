name: Publish Readiness

"on":
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-readiness:
    name: Release Readiness Checks
    runs-on: ubuntu-latest
    env:
      INDEPENDENT_CRATES: >-
        use-language use-script use-region use-currency-code use-time-zone-id
      DEFERRED_DEPENDENT_CRATES: >-
        use-timezone use-locale-tag use-locale-match
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install stable Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          cache-workspaces: |
            . -> target

      - name: Check examples with all features enabled
        run: cargo check --workspace --all-features --examples

      - name: Test workspace without default features
        run: cargo test --workspace --no-default-features

      - name: Dry-run publish independent focused crates
        run: |
          for crate in $INDEPENDENT_CRATES; do
            cargo package --list -p "$crate"
            cargo publish --dry-run --allow-dirty -p "$crate"
          done

      - name: Note deferred dependent focused crates
        run: |
          printf '%s\n' "Deferred until sibling dependencies are live on crates.io: $DEFERRED_DEPENDENT_CRATES"
